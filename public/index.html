<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecommerce Demo</title>

<link rel="stylesheet" href="style.css">

<!-- Salesforce Web SDK -->
<script src="https://cdn.c360a.salesforce.com/beacon/sdk.js"></script>

<!-- Tracking Script -->
<script src="tracking.js" defer></script>

</head>

<body>

<header>
<h1>Ecommerce Demo Store</h1>

<button id="view-cart">🛒 View Cart</button>
</header>

<main>

<section class="products">

<!-- PRODUCT 1 -->

<div class="product-card"
data-product-id="prod-101"
data-product-name="Running Shoes"
data-product-price="1999"
data-product-image="img/shoes.jpg">

<img src="img/shoes.jpg">

<h3>Running Shoes</h3>

<p>₹1999</p>

<button class="add-to-cart"
data-product-id="prod-101"
data-product-name="Running Shoes"
data-product-price="1999"
data-product-image="img/shoes.jpg">

Add To Cart

</button>

</div>


<!-- PRODUCT 2 -->

<div class="product-card"
data-product-id="prod-102"
data-product-name="Smart Watch"
data-product-price="4999"
data-product-image="img/watch.jpg">

<img src="img/watch.jpg">

<h3>Smart Watch</h3>

<p>₹4999</p>

<button class="add-to-cart"
data-product-id="prod-102"
data-product-name="Smart Watch"
data-product-price="4999"
data-product-image="img/watch.jpg">

Add To Cart

</button>

</div>


<!-- PRODUCT 3 -->

<div class="product-card"
data-product-id="prod-103"
data-product-name="Bluetooth Headphones"
data-product-price="2999"
data-product-image="img/headphones.jpg">

<img src="img/headphones.jpg">

<h3>Bluetooth Headphones</h3>

<p>₹2999</p>

<button class="add-to-cart"
data-product-id="prod-103"
data-product-name="Bluetooth Headphones"
data-product-price="2999"
data-product-image="img/headphones.jpg">

Add To Cart

</button>

</div>

</section>

</main>


<!-- CART PANEL -->

<section id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<button id="checkout">
Proceed to Checkout
</button>

</section>


<!-- PURCHASE BUTTON (Demo Only) -->

<section>

<button id="complete-order">
Complete Purchase
</button>

</section>


<script>

/* DEMO PURCHASE EVENT */

document.getElementById("complete-order").addEventListener("click", function(){

const order = {
orderId: "ORD-"+Date.now(),
total: 7999,
items:[
{id:"prod-101"},
{id:"prod-102"}
]
};

document.dispatchEvent(
new CustomEvent("purchaseComplete",{detail:order})
);

});

</script>

</body>
</html>
